<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>템플릿</title>
	<style>
		div {
			width: 100px;
			height: 100px;
			position: absolute;
		}

		/* 부모 기준 설정 (핵심) */
		#mydiv {
			position: relative;
			top: 10px;
			left: 10px;
			width: 300px;
			height: 300px;
			background: white;
			border: 1px solid red;
		}

		.test1 { /* 소녀 시대 */
			top: 20px;
			left: 0px;
			background: aqua;
		}

		.test2 {
			top: 50px;
			left: 150px;
			background: fuchsia;
		}

		.test3 {
			top: 150px;
			left: 30px;
			background: yellow;
		}

		.test4 {
			bottom: 20px;
			left: 120px;
			background: blue;
			color: white;
		}
	</style>
</head>
<body>
<div id="mydiv">
	<div class="test1">소녀 시대</div>
	<div class="test2">원더 걸스</div>
	<div class="test3">티아라</div>
	<div class="test4">EXID</div>
</div>
</body>
</html>
