<%@ page language="java" contentType="text/html; charset=UTF-8"
    pageEncoding="UTF-8"%>
<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
</head>
<body>
	<h2 align="center">회원 가입 화면</h2>
	<form action="가야할_주소">
	<table border="1" width="80%" align="center">
		<tr>
			<td width="20%" align="center">* 이름</td>
			<td width="80%">
				<input type="text" name="name" id="name">
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">* 아이디</td>
			<td width="80%">
				<input type="text" name="id" id="id" value="">
				<input type="button" value="중복 체크"> 
			</td>
		</tr>		
		<tr>
			<td width="20%" align="center">* 비밀 번호</td>
			<td width="80%">
				<input type="password" name="password" id="password" >
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">* 비밀 번호 확인</td>
			<td width="80%">
				<input type="password" name="repassword" id="repassword" >
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">주민 등록 번호</td>
			<td width="80%">
				<input type="text" name="ssn1" id="ssn1">
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<input type="text" name="ssn2" id="ssn2">
			</td>
		</tr>		
		<tr>
			<td width="20%" align="center">성별</td>
			<td width="80%">
				<input type="radio" name="gender" id="gender" value="남자" checked="checked">남자
				<input type="radio" name="gender" id="gender" value="여자" checked="checked">여자  
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">직업</td>
			<td width="80%">
				<select name="job" id="job" >
					<option value="-">-- 직업 선택   	
					<option value="전문직">전문직              
					<option value="학생">학생
					<option value="교수">교수
					<option value="기타">기타
				</select>  
			</td>
		</tr>			
		<tr>
			<td width="20%" align="center">취미</td>
			<td width="80%">				
				<input type="checkbox" name="hobby" id="hobby" value="당구" checked="checked">당구
				<input type="checkbox" name="hobby" id="hobby" value="독서" checked="checked">독서				
				<input type="checkbox" name="hobby" id="hobby" value="운동">운동
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">이메일</td>
			<td width="80%" align="left">
				<input type="text" name="email1" id=email1> 
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<select name="email2" id="email2" >
					<option value="-">-- 이메일 선택     
					<option value="네이버">네이버              
					<option value="다음">다음
					<option value="구글">구글
				</select> 
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">전화 번호</td>
			<td width="80%" align="left">
				 <select name="phone1" id="phone1" >
					<option value="-">-- 지역 번호 선택     
					<option value="02">02              
					<option value="054">054
					<option value="062">062
				</select>
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<input type="text" name="phone2" id="phone2">
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<input type="text" name="phone3" id="phone3">
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">핸드폰 번호</td>
			<td width="80%" align="left">
				 <select name="handphone1" id="handphone1" >
					<option value="-">-- 번호 선택     
					<option value="010">010              
					<option value="011">011
					<option value="015">015
				</select>
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<input type="text" name="handphone2" id="handphone2">
				&nbsp;&nbsp;-&nbsp;&nbsp;
				<input type="text" name="handphone3" id="handphone3">
			</td>
		</tr>		
		<tr>
			<td colspan="2" align="center">
				<input type="submit" value="회원 가입" >
				&nbsp;&nbsp;&nbsp;
				<input type="reset" value="초기화" >
			</td>
		</tr>		
	</table>
	</form>
</body>
</html>
