<%@ page language="java" contentType="text/html; charset=UTF-8"
    pageEncoding="UTF-8"%>
<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
	<script type="text/javascript">
		function formcheck(){
			/* 4 <= id <= 10  */
			var id = document.myform.id.value ;
			if(  id.length < 4 || id.length > 10  ){
				alert('아이디는 최소 4자 이상, 최대 10자 이하로 입력 요망') ;
				document.myform.id.focus() ;
				//document.myform.id.select() ;
				return false ; 
			}
			/* 2 <= name <= 10  */
			var name = document.myform.name.value ;
			if(  name.length < 2 || name.length > 10  ){
				alert('이름은 최소 2자 이상, 최대 10자 이하로 입력 요망') ;
				document.myform.name.focus() ;
				//document.myform.name.select() ;
				return false ; 
			}			
			
			/* 6 <= password <= 12  */
			var password = document.myform.password.value ;
			if(  password.length < 6 || password.length > 12  ){
				alert('비밀 번호는 최소 6자 이상, 최대 12자 이하로 입력 요망') ;
				document.myform.password.focus() ;
				//document.myform.password.select() ;
				return false ; 
			}	
			/* 우편 번호는 반드시 ddd-ddd 또는 dddddd 형식이어야 한다. */
			/* 여기서 d는 숫자 1개를 의미 */ 
			var zipcode = document.myform.zipcode.value ;
			var regex = /^\d{3}-?\d{3}$/ ;
			
			if( zipcode.search( regex ) == -1 ){ 
				alert( '잘못된 우편 번호 형식입니다.') ;
				document.myform.zipcode.focus() ;
				return false ; 
			}			
			/* 정규 표현식 사용 : 날짜 형식은 반드시 yyyy/MM/dd 형식이어야 한다. */
			
			/* 성별은 반드시 하나 체크 되어야 합니다 */
			var gender = document.myform.gender ;
			var cntgender = 0 ;
			for(var i = 0 ; i < gender.length  ; i++){
				if( gender[i].checked == true){
					cntgender++ ;
					break ;
				}
			}
			if( cntgender != 1 ){
				alert('성별은 반드시 하나 체크 되어야 합니다') ;
				return false ;
			}			
			
			/* 취미는 최소 2개 이상 선택하셔야 합니다. */
			
			
			
			
			
			
			
			
			
			
			
			
			
			

			
			/* 취미는 최소 2개 이상 선택하셔야 합니다. */
			
			alert('추카 추카') ;
			return false ;
			//return true ;
		}
	</script>
</head>
<body>
	<h2 align="center">회원 가입 화면</h2>
	<form action="gotopage1.jsp" name="myform">
	<table border="1" width="80%" align="center">
		<tr>
			<td width="20%" align="center">아이디</td>
			<td width="80%">
				<input type="text" name="id" id="id" value="hong">
				<input type="button" value="중복 체크"> 
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">이름</td>
			<td width="80%">
				<input type="text" name="name" id="name" value="홍길동">
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">비밀번호</td>
			<td width="80%">
				<input type="password" name="password" id="password" value="123456">
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">급여</td>
			<td width="80%">
				<input type="text" name="salary" id="salary" value="100" value="">
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">입사 일자</td>
			<td width="80%">
				<input type="text" name="hiredate" id="hiredate" value="2016/06/08" >
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">성별</td>
			<td width="80%">
				<input type="radio" name="gender" id="gender" value="남자" >남자
				<input type="radio" name="gender" id="gender" value="여자" >여자  
			</td>
		</tr>			
		<tr>
			<td width="20%" align="center">취미</td>
			<td width="80%">
				<input type="checkbox" name="hobby" id="hobby" value="독서" >독서
				<input type="checkbox" name="hobby" id="hobby" value="운동">운동  
				<input type="checkbox" name="hobby" id="hobby" value="음악 감상" >음악 감상
				<input type="checkbox" name="hobby" id="hobby" value="퀼트">퀼트
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">직업</td>
			<td width="80%">
				<select name="job" id="job" >
					<option value="전문직">전문직              
					<option value="학생" selected="selected">학생
					<option value="교수">교수
					<option value="기타">기타
				</select>  
			</td>
		</tr>	
		<tr>
			<td width="20%" align="center">우편 번호</td>
			<td width="80%" align="left">
				<input type="text" name="zipcode" id="zipcode" value="123-45" readonly="readonly"> 
				<input type="button" value="우편 번호 찾기">
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">주소</td>
			<td width="80%" align="left">
				<input type="text" name="address1" id="address1" size="40" readonly="readonly"> 
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">세부 주소</td>
			<td width="80%" align="left">
				<input type="text" name="address2" id="address2"  size="40">
			</td>
		</tr>
		<tr>
			<td width="20%" align="center">코멘트</td>
			<td width="80%" align="left">
				<textarea rows="5" cols="20"></textarea>
			</td>
		</tr>
		<input type="hidden" name="mpoint" id="mpoint" value="30">
		<tr>
			<td width="20%" align="center">이미지</td>
			<td width="80%">
				<input type="file" name="image" id="image" >
			</td>
		</tr>		
		<tr>
			<td colspan="2" align="center">
				<input type="submit" value="전송하기" onclick="return formcheck();" >
				&nbsp;&nbsp;&nbsp;
				<input type="reset" value="초기화" >
			</td>
		</tr>		
	</table>
	</form>
</body>
</html>
