<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container" style="margin-top:30px; max-width:800px;">
    <h1>상품 등록</h1>

    <!-- 🔹 일반 오류 메시지 -->
    <div id="generalError" class="alert alert-danger" style="display:none;">
        상품 등록 중 오류가 발생했습니다.
    </div>

    <form id="productForm">

        <!-- 이름 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">이름</label>
            <div class="col-sm-10">
                <input type="text" name="name" class="form-control" placeholder="이름을 입력해 주세요.">
                <div class="invalid-feedback">이름 오류</div>
            </div>
        </div>

        <!-- 가격 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">가격</label>
            <div class="col-sm-10">
                <input type="text" name="price" class="form-control" placeholder="가격을 입력해 주세요.">
                <div class="invalid-feedback">가격 오류</div>
            </div>
        </div>

        <!-- 카테고리 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">카테고리</label>
            <div class="col-sm-10">
                <select name="category" class="form-select">
                    <option value="-">-- 카테고리를 선택해 주세요.</option>
                    <option value="BREAD">빵</option>
                    <option value="BEVERAGE">음료수</option>
                    <option value="CAKE">케이크</option>
                </select>
                <div class="invalid-feedback">카테고리 오류</div>
            </div>
        </div>

        <!-- 재고 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">재고</label>
            <div class="col-sm-10">
                <input type="text" name="stock" class="form-control" placeholder="재고를 입력해 주세요.">
                <div class="invalid-feedback">재고 오류</div>
            </div>
        </div>

        <!-- 이미지 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">이미지</label>
            <div class="col-sm-10">
                <input type="file" name="image" class="form-control" id="imageInput">
                <div class="invalid-feedback">이미지 오류</div>

                <!-- 미리보기 -->
                <img id="preview" src="" style="margin-top:10px; max-width:200px; display:none;">
            </div>
        </div>

        <!-- 상품 설명 -->
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">상품 설명</label>
            <div class="col-sm-10">
                <input type="text" name="description" class="form-control" placeholder="상품 설명을 입력해 주세요.">
                <div class="invalid-feedback">설명 오류</div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">상품 등록</button>

    </form>
</div>

<script>
    const form = document.getElementById("productForm");
    const preview = document.getElementById("preview");

    // 🔹 파일 선택 → 미리보기 (React의 FileReader와 동일 개념)
    document.getElementById("imageInput").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onloadend = function() {
            preview.src = reader.result;
            preview.style.display = "block";
        };
    });

    // 🔹 제출 이벤트 (React의 SubmitAction 느낌)
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const formData = new FormData(form);
        const category = formData.get("category");

        // 간단한 검증
        if (category === "-") {
            alert("카테고리를 선택해 주세요.");
            return;
        }

        // 실제 서버 전송 대신 콘솔 출력
        console.log("전송 데이터:");
        for (let [key, value] of formData.entries()) {
            console.log(key, value);
        }

        alert("상품 등록 (예시)");
    });
</script>

</body>
</html>
