<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">

    <!-- 상태 전환 버튼 (테스트용) -->
    <div class="mb-3">
        <button class="btn btn-secondary btn-sm" onclick="showLoading()">Loading</button>
        <button class="btn btn-danger btn-sm" onclick="showError()">Error</button>
        <button class="btn btn-success btn-sm" onclick="showSuccess()">Success</button>
    </div>

    <!-- 🔹 로딩 화면 -->
    <div id="loadingView" class="d-flex justify-content-center align-items-center p-5">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">주문 목록을 불러오는 중입니다.</span>
        </div>
    </div>

    <!-- 🔹 에러 화면 -->
    <div id="errorView" class="container my-4" style="display:none;">
        <div class="alert alert-danger">
            주문 목록을 불러 오는 데 실패하였습니다.
        </div>
    </div>

    <!-- 🔹 정상 화면 -->
    <div id="successView" class="container my-4" style="display:none;">
        <h1 class="my-4">주문 내역</h1>
        이전에 <span id="orderCount">3</span> 개 주문하셨네요.
    </div>

</div>

<script>
    function showLoading() {
        document.getElementById("loadingView").style.display = "flex";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "none";
    }

    function showError() {
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "block";
        document.getElementById("successView").style.display = "none";
    }

    function showSuccess() {
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "block";

        // 주문 개수 예시 변경
        document.getElementById("orderCount").innerText = 5;
    }

    // 초기 상태 (React의 loading=true와 동일)
    showLoading();
</script>

</body>
</html>
