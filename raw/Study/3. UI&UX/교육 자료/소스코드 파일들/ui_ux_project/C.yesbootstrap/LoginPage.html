<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid d-flex justify-content-center align-items-center" style="height: 70vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-sm-10">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4">로그인</h2>

                    <!-- 에러 메시지 (필요 시 표시) -->
                    <!--
                    <div class="alert alert-danger">
                        로그인 실패 메시지
                    </div>
                    -->

                    <form>
                        <!-- 이메일 -->
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-3 text-end fw-bold text-primary">
                                이메일
                            </label>
                            <div class="col-sm-9">
                                <input
                                        type="email"
                                        class="form-control"
                                        placeholder="이메일을 입력해 주세요."
                                        required
                                >
                            </div>
                        </div>

                        <!-- 비밀번호 -->
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-3 text-end fw-bold text-primary">
                                비밀 번호
                            </label>
                            <div class="col-sm-9">
                                <input
                                        type="password"
                                        class="form-control"
                                        placeholder="비밀 번호를 입력해 주세요."
                                        required
                                >
                            </div>
                        </div>

                        <!-- 버튼 영역 -->
                        <div class="row g-2">
                            <div class="col-8">
                                <button type="submit" class="btn btn-primary w-100">
                                    로그인
                                </button>
                            </div>
                            <div class="col-4">
                                <a href="/member/signup" class="btn btn-outline-secondary w-100">
                                    회원 가입
                                </a>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
