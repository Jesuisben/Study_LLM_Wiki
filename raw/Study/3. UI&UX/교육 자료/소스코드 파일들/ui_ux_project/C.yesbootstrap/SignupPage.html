<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 가입</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="height:70vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4">회원 가입</h2>

                    <!-- 🔹 일반 오류 -->
                    <div id="generalError" class="alert alert-danger" style="display:none;">
                        회원 가입 중 오류가 발생하였습니다.
                    </div>

                    <form id="signupForm">

                        <!-- 이름 -->
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">이름</label>
                            <div class="col-sm-9">
                                <input type="text" id="name" class="form-control" placeholder="이름을 입력해 주세요.">
                                <div class="invalid-feedback">이름 오류</div>
                            </div>
                        </div>

                        <!-- 이메일 -->
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">이메일</label>
                            <div class="col-sm-9">
                                <input type="text" id="email" class="form-control" placeholder="이메일을 입력해 주세요.">
                                <div class="invalid-feedback">이메일 오류</div>
                            </div>
                        </div>

                        <!-- 비밀번호 -->
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">비밀번호</label>
                            <div class="col-sm-9">
                                <input type="password" id="password" class="form-control" placeholder="비밀 번호를 입력해 주세요.">
                                <div class="invalid-feedback">비밀번호 오류</div>
                            </div>
                        </div>

                        <!-- 주소 -->
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">주소</label>
                            <div class="col-sm-9">
                                <input type="text" id="address" class="form-control" placeholder="주소를 입력해 주세요.">
                                <div class="invalid-feedback">주소 오류</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            회원 가입
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        // 값 가져오기 (React의 state 대신)
        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const address = document.getElementById("address");

        // 오류 초기화
        document.querySelectorAll(".form-control").forEach(el => {
            el.classList.remove("is-invalid");
        });

        let hasError = false;

        // 🔹 간단한 유효성 검사 (React errors 대체)
        if (name.value.trim() === "") {
            setError(name, "이름을 입력해 주세요.");
            hasError = true;
        }

        if (email.value.trim() === "") {
            setError(email, "이메일을 입력해 주세요.");
            hasError = true;
        }

        if (password.value.trim() === "") {
            setError(password, "비밀번호를 입력해 주세요.");
            hasError = true;
        }

        if (address.value.trim() === "") {
            setError(address, "주소를 입력해 주세요.");
            hasError = true;
        }

        if (hasError) return;

        // 🔹 서버 전송 대신 콘솔 출력
        const parameters = {
            name: name.value,
            email: email.value,
            password: password.value,
            address: address.value
        };

        console.log("회원 가입 데이터:", parameters);

        alert("회원 가입 성공 (예시)");

        // React의 navigate("/member/login") 느낌
        window.location.href = "/member/login";
    });

    function setError(input, message) {
        input.classList.add("is-invalid");
        input.nextElementSibling.innerText = message;
    }
</script>

</body>
</html>
