<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Cart List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4">
        <span style="color: blue; font-size: 2rem;">홍길동</span>
        <span style="font-size: 1.3rem;">님의 장바구니</span>
    </h2>

    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th style="font-size:1.2rem;">
                <input type="checkbox"> 전체 선택
            </th>
            <th style="font-size:1.2rem;">상품 정보</th>
            <th style="font-size:1.2rem;">수량</th>
            <th style="font-size:1.2rem;">금액</th>
            <th style="font-size:1.2rem;">삭제</th>
        </tr>
        </thead>
        <tbody>
        <!-- 상품 1 -->
        <tr>
            <td class="text-center align-middle">
                <input type="checkbox" checked>
            </td>

            <td class="text-center align-middle">
                <div class="row">
                    <div class="col-4">
                        <img src="/images/americano01.png"
                             class="img-thumbnail"
                             width="80" height="80">
                    </div>
                    <div class="col-8 d-flex align-items-center">
                        노트북
                    </div>
                </div>
            </td>

            <td class="text-center align-middle">
                <input type="number" value="1" min="1"
                       class="form-control"
                       style="width:80px; margin:0 auto;">
            </td>

            <td class="text-center align-middle">
                1,000,000 원
            </td>

            <td class="text-center align-middle">
                <button class="btn btn-danger btn-sm">삭제</button>
            </td>
        </tr>

        <!-- 상품 2 -->
        <tr>
            <td class="text-center align-middle">
                <input type="checkbox">
            </td>

            <td class="text-center align-middle">
                <div class="row">
                    <div class="col-4">
                        <img src="/images/brioche_02.png"
                             class="img-thumbnail"
                             width="80" height="80">
                    </div>
                    <div class="col-8 d-flex align-items-center">
                        스마트폰
                    </div>
                </div>
            </td>

            <td class="text-center align-middle">
                <input type="number" value="2" min="1"
                       class="form-control"
                       style="width:80px; margin:0 auto;">
            </td>

            <td class="text-center align-middle">
                2,000,000 원
            </td>

            <td class="text-center align-middle">
                <button class="btn btn-danger btn-sm">삭제</button>
            </td>
        </tr>

        <!-- 데이터 없을 경우 -->
        <!--
        <tr>
            <td colspan="5" class="text-center">
                장바구니가 비어 있습니다.
            </td>
        </tr>
        -->
        </tbody>
    </table>

    <h3 class="text-end mt-3">총 주문 금액 : 3,000,000원</h3>

    <div class="text-end">
        <button class="btn btn-primary btn-lg">주문하기</button>
    </div>
</div>

</body>
</html>
