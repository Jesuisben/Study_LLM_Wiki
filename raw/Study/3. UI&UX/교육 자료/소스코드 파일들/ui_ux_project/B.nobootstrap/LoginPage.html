<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* 전체 가운데 정렬 */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        /* 카드 스타일 */
        .card {
            width: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* 폼 행 */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-row label {
            width: 30%;
            text-align: right;
            font-weight: bold;
            color: blue;
            padding-right: 10px;
        }

        .form-row input {
            width: 70%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* 버튼 영역 */
        .button-row {
            display: flex;
            gap: 10px;
        }

        .button-row button,
        .button-row a {
            flex: 1;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
        }

        .btn-outline {
            border: 1px solid #6c757d;
            color: #6c757d;
            background-color: white;
        }

        .btn-outline:hover {
            background-color: #6c757d;
            color: white;
        }

        /* 에러 메시지 */
        .alert {
            background-color: #f8d7da;
            color: #842029;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>로그인</h2>

        <!-- 에러 메시지 -->
        <!--
        <div class="alert">
            로그인 실패 메시지
        </div>
        -->

        <form>
            <!-- 이메일 -->
            <div class="form-row">
                <label>이메일</label>
                <input type="email" placeholder="이메일을 입력해 주세요." required>
            </div>

            <!-- 비밀번호 -->
            <div class="form-row">
                <label>비밀 번호</label>
                <input type="password" placeholder="비밀 번호를 입력해 주세요." required>
            </div>

            <!-- 버튼 -->
            <div class="button-row">
                <button type="submit" class="btn-primary">로그인</button>
                <a href="/member/signup" class="btn-outline">회원 가입</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
