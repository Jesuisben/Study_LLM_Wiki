<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            margin: 20px;
        }

        /* 버튼 */
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background-color: #0d6efd; color: white; }
        .btn-success { background-color: #198754; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }

        /* 카드 */
        .card {
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        /* 2컬럼 (이미지 : 정보 = 1 : 2) */
        .row {
            display: flex;
        }

        .col-4 {
            width: 33.33%;
        }

        .col-8 {
            width: 66.66%;
            padding: 15px;
        }

        img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        /* 테이블 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        td:first-child {
            background-color: #f2f2f2;
            text-align: center;
            width: 30%;
        }

        /* 입력 영역 */
        .input-row {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .input-row div:first-child {
            width: 30%;
            text-align: center;
            font-weight: bold;
        }

        .input-row input {
            width: 120px;
            padding: 6px;
            margin-left: 10px;
        }

        /* 버튼 정렬 */
        .button-group {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }

        /* 상태 텍스트 */
        .text-center {
            text-align: center;
        }

        h3 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 상태 버튼 -->
    <div style="margin-bottom:10px;">
        <button class="btn btn-secondary" onclick="showLoading()">Loading</button>
        <button class="btn btn-danger" onclick="showError()">No Data</button>
        <button class="btn btn-success" onclick="showSuccess()">Success</button>
    </div>

    <!-- 🔹 로딩 -->
    <div id="loadingView" class="text-center">
        <h3>상품 정보를 읽어 오는 중입니다.</h3>
    </div>

    <!-- 🔹 데이터 없음 -->
    <div id="errorView" class="text-center" style="display:none;">
        <h3>상품 정보를 찾을 수 없습니다.</h3>
    </div>

    <!-- 🔹 정상 화면 -->
    <div id="successView" style="display:none;">
        <div class="card">
            <div class="row">

                <!-- 이미지 -->
                <div class="col-4">
                    <img src="/images/brioche_02.png">
                </div>

                <!-- 정보 -->
                <div class="col-8">
                    <h3>브리오슈</h3>

                    <table>
                        <tr>
                            <td>가격</td>
                            <td>4,000원</td>
                        </tr>
                        <tr>
                            <td>카테고리</td>
                            <td>빵</td>
                        </tr>
                        <tr>
                            <td>재고</td>
                            <td>10개</td>
                        </tr>
                        <tr>
                            <td>설명</td>
                            <td>프랑스에서 유래한 버터가 많이 들어간 달콤하고 부드러운 빵입니다.</td>
                        </tr>
                        <tr>
                            <td>등록일자</td>
                            <td>2026-03-20</td>
                        </tr>
                    </table>

                    <!-- 수량 -->
                    <div class="input-row">
                        <div>구매 수량</div>
                        <input type="number" min="1" value="1">
                    </div>

                    <!-- 버튼 -->
                    <div class="button-group">
                        <a href="/product/list" class="btn btn-primary">이전 목록</a>
                        <button class="btn btn-success" onclick="alert('장바구니 기능')">장바구니</button>
                        <button class="btn btn-danger">주문하기</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

<script>
    function showLoading() {
        document.getElementById("loadingView").style.display = "block";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "none";
    }

    function showError() {
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "block";
        document.getElementById("successView").style.display = "none";
    }

    function showSuccess() {
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "block";
    }

    showLoading();
</script>

</body>
</html>
