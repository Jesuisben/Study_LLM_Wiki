<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fruit List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse; /* 테두리 합치기 */
        }

        thead {
            background-color: #f2f2f2;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        tr:hover {
            background-color: #f5f5f5; /* hover 효과 */
        }

        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <table>
        <thead>
        <tr>
            <th>아이디</th>
            <th>상품명</th>
            <th>단가</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1</td>
            <td>사과</td>
            <td>3,000 원</td>
        </tr>
        <tr>
            <td>2</td>
            <td>바나나</td>
            <td>2,500 원</td>
        </tr>
        <tr>
            <td>3</td>
            <td>딸기</td>
            <td>5,000 원</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
